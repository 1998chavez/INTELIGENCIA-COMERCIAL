<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Centro de Inteligencia Comercial · Julio 2026</title>
<meta name="theme-color" content="#0A1120" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F1F4F9" media="(prefers-color-scheme: light)">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%234DA3FF'/%3E%3Cstop offset='1' stop-color='%237C5CFF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='42' font-family='Arial,sans-serif' font-size='28' font-weight='800' fill='white' text-anchor='middle'%3ECI%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A1120; --surface:#101A2E; --surface2:#0D1626; --line:#1E2A44; --line2:#28365A;
  --ink:#E8EEF8; --muted:#8DA0BC; --muted2:#74889F;
  --accent:#4DA3FF; --accent-ink:#0A1120; --accent-soft:rgba(77,163,255,.12);
  --verde:#22C186; --ambar:#F2B33D; --rojo:#F0564F; --gris:#5F7492;
  --verde-soft:rgba(34,193,134,.13); --ambar-soft:rgba(242,179,61,.14); --rojo-soft:rgba(240,86,79,.14); --gris-soft:rgba(95,116,146,.15);
  --shadow:0 10px 30px rgba(2,8,20,.45);
  --r:14px; --r-sm:9px;
  --font-d:'Archivo',system-ui,-apple-system,sans-serif;
  --font-b:'Inter',system-ui,-apple-system,sans-serif;
}
[data-theme="light"]{
  --bg:#F1F4F9; --surface:#FFFFFF; --surface2:#F7F9FC; --line:#E2E8F2; --line2:#CBD6E6;
  --ink:#0C1B2E; --muted:#5B6B84; --muted2:#6F819C;
  --accent:#0057C8; --accent-ink:#FFFFFF; --accent-soft:rgba(0,87,200,.09);
  --verde:#0E9F6E; --ambar:#C77E08; --rojo:#DC3B33; --gris:#8494AC;
  --verde-soft:rgba(14,159,110,.10); --ambar-soft:rgba(199,126,8,.12); --rojo-soft:rgba(220,59,51,.10); --gris-soft:rgba(132,148,172,.14);
  --shadow:0 8px 24px rgba(12,27,46,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font-b);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 10px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
::-webkit-scrollbar{height:9px;width:9px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:9px}::-webkit-scrollbar-track{background:transparent}

/* ===== Layout ===== */
#app{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
aside{background:var(--surface);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px}
.brand .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7C5CFF);display:grid;place-items:center;font-family:var(--font-d);font-weight:800;font-size:15px;color:#fff;letter-spacing:-.5px}
.brand b{font-family:var(--font-d);font-size:14.5px;font-weight:700;letter-spacing:.2px;display:block;line-height:1.15}
.brand span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px}
.navlbl{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted2);padding:12px 10px 5px}
.navbtn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:10px;font-size:13.2px;font-weight:500;color:var(--muted);text-align:left;transition:all .15s}
.navbtn svg{width:17px;height:17px;flex:none}
.navbtn:hover{background:var(--surface2);color:var(--ink)}
.navbtn.on{background:var(--accent-soft);color:var(--accent);font-weight:600}
.navbtn .pill{margin-left:auto;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:99px;background:var(--rojo);color:#fff}
.side-foot{margin-top:auto;padding:10px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted2);line-height:1.5}

main{min-width:0;padding:0 26px 60px}
header.top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(10px);display:flex;align-items:center;gap:14px;padding:14px 0 12px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.live{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--verde);background:var(--verde-soft);padding:5px 11px;border-radius:99px}
.live .dot{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,193,134,.55)}70%{box-shadow:0 0 0 7px rgba(34,193,134,0)}100%{box-shadow:0 0 0 0 rgba(34,193,134,0)}}
.sync{font-size:11.5px;color:var(--muted)}
.sync b{color:var(--ink);font-weight:600}
.top .sp{flex:1}
.wksel{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:3px}
.wksel button{padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;color:var(--muted)}
.wksel button.on{background:var(--accent);color:var(--accent-ink)}
.icobtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--muted)}
.icobtn:hover{color:var(--ink);border-color:var(--line2)}
.demo-toggle{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:5px 12px 5px 6px}
.demo-toggle .sw{width:30px;height:17px;border-radius:99px;background:var(--line2);position:relative;transition:.2s}
.demo-toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:.2s}
.demo-toggle.on .sw{background:var(--ambar)}
.demo-toggle.on .sw::after{left:15px}
.demo-toggle.on{color:var(--ambar)}

/* breadcrumb tipo línea */
.crumbs{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin:2px 0 18px}
.crumb{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--muted);padding:6px 12px;border-radius:99px;transition:.15s}
.crumb:not(.here):hover{color:var(--accent);background:var(--accent-soft)}
.crumb.here{color:var(--ink);background:var(--surface);border:1px solid var(--line);pointer-events:none}
.crumb .lvl{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);font-weight:700}
.crumb-sep{width:22px;height:2px;background:var(--line2);margin:0 2px;flex:none}

/* hero */
.hero{display:grid;grid-template-columns:auto 1fr auto;gap:26px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px 26px;box-shadow:var(--shadow);margin-bottom:20px}
.ring{position:relative;width:128px;height:128px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2px}
.ring .val b{font-family:var(--font-d);font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.ring .val span{font-size:8px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);max-width:80px;line-height:1.25}
.hero h1{font-family:var(--font-d);font-size:21px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.hero .sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.chips{display:flex;gap:14px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--muted)}
.chip i{width:8px;height:8px;border-radius:50%;flex:none}
.chip .num{font-family:var(--font-d);font-weight:800;font-size:13.5px;color:var(--ink)}
.dist{max-width:460px}
.distbar{display:flex;height:8px;border-radius:8px;overflow:hidden;background:var(--gris-soft);margin-bottom:9px}
.distbar i{height:100%}
.distleg{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted)}
.distleg b{font-family:var(--font-d);font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
.distleg .dld{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:-1px}
.hero .proj{min-width:190px;text-align:right;border-left:1px solid var(--line);padding-left:24px}
.proj .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted2);font-weight:700}
.proj b{font-family:var(--font-d);font-size:30px;font-weight:800;letter-spacing:-1px;display:block;margin:3px 0 1px}
.proj .det{font-size:11px;color:var(--muted)}

/* KPI cards */
.grid-kpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px;margin-bottom:22px}
.kcard{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px 13px 20px;overflow:hidden}
.kcard .bar{position:absolute;left:0;top:0;bottom:0;width:5px}
.kcard .name{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;min-height:28px;line-height:1.3}
.kcard .big{font-family:var(--font-d);font-size:29px;font-weight:800;letter-spacing:-1.2px;line-height:1.05;margin:5px 0 2px}
.kcard .big small{font-size:15px;font-weight:700;letter-spacing:0;color:var(--muted)}
.kcard .mr{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:7px;border-top:1px dashed var(--line);padding-top:7px}
.kcard .mr b{color:var(--ink);font-weight:600}
.kcard .spark{margin-top:8px;height:26px}
.kcard.sinc .big{color:var(--muted2)}
.tag{display:inline-flex;align-items:center;font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 7px;border-radius:5px}
.tag.v{color:var(--verde);background:var(--verde-soft)} .tag.a{color:var(--ambar);background:var(--ambar-soft)}
.tag.r{color:var(--rojo);background:var(--rojo-soft)} .tag.g{color:var(--muted);background:var(--gris-soft)}
.tag.info{color:var(--accent);background:var(--accent-soft)}

/* secciones y tablas */
.sec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.sec>.hd{display:flex;align-items:center;gap:12px;padding:15px 20px;border-bottom:1px solid var(--line)}
.sec>.hd h2{font-family:var(--font-d);font-size:15px;font-weight:700;letter-spacing:-.2px}
.sec>.hd .sub{font-size:11.5px;color:var(--muted)}
.sec>.hd .sp{flex:1}
.tblwrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted2);font-weight:700;text-align:right;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--surface2)}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--surface);z-index:2}
th:first-child{background:var(--surface2)}
td{padding:9px 12px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr.click{cursor:pointer}
tr.click:hover td{background:var(--accent-soft)}
tr.click:focus{outline:2px solid var(--accent);outline-offset:-2px}
tr.click:focus td{background:var(--accent-soft)}
tr.click:hover td:first-child{background:color-mix(in srgb,var(--surface) 60%,var(--accent-soft))}
td .who{display:flex;align-items:center;gap:9px;font-weight:600}
td .who .rk{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:10.5px;font-weight:800;background:var(--surface2);border:1px solid var(--line);color:var(--muted)}
td .who .rk.top{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.cell{display:inline-flex;align-items:center;gap:7px;justify-content:flex-end}
.dotc{width:8px;height:8px;border-radius:50%;flex:none}
.barcell{display:flex;align-items:center;gap:8px;justify-content:flex-end;min-width:120px}
.bartrack{width:64px;height:6px;border-radius:6px;background:var(--gris-soft);overflow:hidden;flex:none}
.bartrack i{display:block;height:100%;border-radius:6px}
.pilarhd td{background:var(--surface2)!important;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted2);font-weight:800;text-align:left;padding:7px 12px}

/* alertas */
.al{display:flex;gap:14px;align-items:flex-start;padding:14px 20px;border-bottom:1px solid var(--line)}
.al:last-child{border-bottom:none}
.al .sev{flex:none;width:74px;text-align:center;font-size:9.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:4px 0;border-radius:6px;margin-top:2px}
.al .sev.critica{background:var(--rojo);color:#fff}
.al .sev.alta{background:var(--rojo-soft);color:var(--rojo)}
.al .sev.media{background:var(--ambar-soft);color:var(--ambar)}
.al .sev.baja{background:var(--gris-soft);color:var(--muted)}
.al .tx b{font-weight:600}
.al .tx .d{font-size:11.5px;color:var(--muted);margin-top:1px}
.al .go{margin-left:auto;flex:none;font-size:11.5px;font-weight:600;color:var(--accent);padding:5px 10px;border-radius:8px}
.al .go:hover{background:var(--accent-soft)}

/* bitácora */
.bit-form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px;border-bottom:1px solid var(--line)}
.bit-form .full{grid-column:1/-1}
.bit-form .hint{font-size:10.5px;color:var(--accent);margin-top:3px;min-height:13px;font-variant-numeric:tabular-nums}
.bit-form label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);font-weight:700;display:block;margin-bottom:4px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;font-size:12.5px;font-weight:700;background:var(--accent);color:var(--accent-ink);transition:.15s}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:var(--surface2);color:var(--ink);border:1px solid var(--line)}
.est{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px}
.est.Abierto{background:var(--rojo-soft);color:var(--rojo)} .est.Proceso{background:var(--ambar-soft);color:var(--ambar)} .est.Cerrado{background:var(--verde-soft);color:var(--verde)}

/* diccionario */
.dic-note{padding:12px 20px;font-size:12px;color:var(--muted);background:var(--accent-soft);border-bottom:1px solid var(--line)}
.dic-note b{color:var(--accent)}

.empty{padding:34px 20px;text-align:center;color:var(--muted)}
.empty b{display:block;font-family:var(--font-d);font-size:15px;color:var(--ink);margin-bottom:4px}
.foot-note{font-size:11px;color:var(--muted2);padding:10px 20px;border-top:1px dashed var(--line)}
.demo-badge{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--ambar);background:var(--ambar-soft);border:1px solid color-mix(in srgb,var(--ambar) 35%,transparent);padding:2px 6px;border-radius:5px;vertical-align:2px;margin-left:6px}

/* responsive */
.menubtn{display:none}
@media(max-width:1080px){
  #app{grid-template-columns:1fr}
  aside{position:fixed;left:0;top:0;bottom:0;width:246px;z-index:60;transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow)}
  aside.open{transform:none}
  .menubtn{display:grid}
  main{padding:0 14px 50px}
  .hero{grid-template-columns:1fr;text-align:center}
  .ring{margin:0 auto}
  .hero .proj{border-left:none;border-top:1px solid var(--line);padding:14px 0 0;text-align:center;min-width:0}
  .chips{justify-content:center}
  .bit-form{grid-template-columns:1fr 1fr}
}
@media(max-width:560px){ .grid-kpi{grid-template-columns:1fr 1fr} .wksel button{padding:5px 8px} .bit-form{grid-template-columns:1fr} .sync{display:none} .demo-toggle span:last-child{display:none} }
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
#login{display:none;position:fixed;inset:0;z-index:80;background:var(--bg);align-items:center;justify-content:center;padding:20px}
#login.on{display:flex}
.lbox{width:min(360px,100%);background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:28px}
.lbox .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#7C5CFF);display:grid;place-items:center;font-family:var(--font-d);font-weight:800;font-size:18px;color:#fff;margin:0 auto 14px}
.lbox h2{font-family:var(--font-d);font-size:17px;font-weight:700;text-align:center;margin-bottom:2px}
.lbox .s{font-size:12px;color:var(--muted);text-align:center;margin-bottom:18px}
.lbox label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);font-weight:700;display:block;margin:10px 0 4px}
.lbox input{width:100%}
.lbox .btn{width:100%;justify-content:center;margin-top:16px}
.lerr{font-size:12px;color:var(--rojo);margin-top:10px;text-align:center;min-height:16px}
.side-user{margin-top:auto;padding:12px 10px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);display:none;align-items:center;gap:8px}
.side-user b{color:var(--ink);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-user button{font-size:11px;font-weight:700;color:var(--rojo)}
#toasts{position:fixed;top:14px;right:14px;z-index:90;display:flex;flex-direction:column;gap:8px;max-width:320px}
.toast{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:10px;box-shadow:var(--shadow);padding:10px 14px;font-size:12.5px;animation:tin .2s ease}
.toast.ok{border-left-color:var(--verde)} .toast.err{border-left-color:var(--rojo)} .toast.warn{border-left-color:var(--ambar)}
@keyframes tin{from{transform:translateX(12px);opacity:0}}
#scrim{display:none;position:fixed;inset:0;background:rgba(4,10,22,.5);z-index:55}
#scrim.on{display:block}
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <div class="brand">
      <div class="logo">CI</div>
      <div><b>Centro de Inteligencia<br>Comercial</b><span>Julio 2026 · Retail</span></div>
    </div>
    <div class="navlbl">Módulos</div>
    <button class="navbtn on" data-view="resumen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Resumen ejecutivo</button>
    <button class="navbtn" data-view="negocio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>KPIs Negocio</button>

const DIAS_HABILES={27:5,28:7,29:7,30:7,31:5}; // días de julio dentro de cada semana
function rng(seed){let a=0;for(const c of seed)a=(a*31+c.charCodeAt(0))>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
let TIENDAS_DATA=TIENDAS;
function buildORG(){
 const wkSum=a=>a.reduce((s,x)=>s+x,0);
 const porRegion={};
 for(const t of TIENDAS_DATA){
   const [cve,nombre,ger,rid,pos,ren,acc,seg,pre]=t;
   const reg=(porRegion[rid]??={gerentes:{}});
   const g=(reg.gerentes[ger]??=[]);
   g.push({id:cve, nombre, nivel:"tienda", hijos:[],
     cuota:{pospago:pos,renov:ren,acces:acc,seguros:seg,prepago:pre},
     cuotaJul:wkSum(pos)});
 }
 const dirs=REGIONES.map(r=>{
   if(!r.tacticos) return {...r, nivel:"direccion", hijos:[]};
   const gs=porRegion[r.id]?porRegion[r.id].gerentes:{};
   const totalCuota=Object.values(gs).flat().reduce((s,t)=>s+t.cuotaJul,0)||1;
   const hijos=Object.entries(gs).map(([ger,tiendas],i)=>{
     tiendas.sort((a,b)=>b.cuotaJul-a.cuotaJul);
     tiendas.forEach(t=>{t.hc=Math.max(4,Math.round(r.oper*(t.cuotaJul/totalCuota)))});
     return {id:r.id+"-G"+String(i+1).padStart(2,"0"), nombre:ger, nivel:"gerente",
       hc:tiendas.reduce((s,t)=>s+t.hc,0), hijos:tiendas};
   }).sort((a,b)=>a.nombre.localeCompare(b.nombre));
   return {...r, nivel:"direccion", hijos};
 });
 return {...NACIONAL, nivel:"vpgn", hijos:dirs};
}

let VENTAS={}, CAPTURA_SEM={}, PENDING={v:{},t:{}};

/* agregado mixto: lo capturado manda; lo no capturado se rellena con demo
   solo si DEMO está activo. Devuelve null si no hay NINGUNA captura real
   en el subárbol (para caer al flujo demo puro). */
let _vm={};
function ventaMix(node,prod,wk){
 const key=node.id+prod+wk+(DEMO?"D":"");
 if(key in _vm)return _vm[key];
 let res;
 const dir=(VENTAS[wk]||{})[node.id];
 if(dir&&dir[prod]!=null){ res={v:dir[prod],demo:false,caps:1} }
 else if(node.hijos&&node.hijos.length){
   let v=0,d=false,caps=0,alguna=false;
   for(const hh of node.hijos){
     const r=ventaMix(hh,prod,wk);
     if(r){v+=r.v;d=d||r.demo;caps+=r.caps;alguna=true}
   }
   res=alguna?{v,demo:d,caps}:null;
 } else if(DEMO&&node.nivel==="tienda"){
   const q=cuota(node,prod,wk);
   res=(q!=null&&q>0)?{v:Math.round(q*demoVal(prod,node,wk)),demo:true,caps:0}:null;
 } else res=null;
 return _vm[key]=res;
}
function nacTac(wk){
 const S_=CAPTURA_SEM[wk]||{}; const rids=REGIONES.filter(x=>x.tacticos).map(x=>x.id);
 const out={}; const peso=r=>{const R=REGIONES.find(x=>x.id===r); return ((S_[r]||{}).hcOper||R.oper||1)};
 const fields=["asist","faltas","capac","entrada","salida","adtAp","adtCi","tko","reinc","google","revneg"];
 for(const f of fields){
   const rs=rids.filter(r=>S_[r]&&S_[r][f]!=null);
   if(rs.length===rids.length){ // consolida solo cuando TODAS las direcciones capturaron
     const tp=rs.reduce((s,r)=>s+peso(r),0);
     out[f]=rs.reduce((s,r)=>s+S_[r][f]*peso(r),0)/tp;
   }
 }
 for(const f of ["hcAut","hcOper","prospMeta","prospReal","leadsMeta","leadsReal"]){
   const rs=rids.filter(r=>S_[r]&&S_[r][f]!=null);
   if(rs.length===rids.length) out[f]=rs.reduce((s,r)=>s+S_[r][f],0);
 }
 return Object.keys(out).length?out:null;
}

/* cuota agregada de un nodo por producto y semana (suma de tiendas) */
let _qc={};
function cuota(node,prod,wk){
 const key=node.id+prod+wk;
 if(key in _qc)return _qc[key];
 let v=null;
 if(node.cuota){v=node.cuota[prod]?node.cuota[prod][wk-27]:null}
 else if(node.hijos&&node.hijos.length){
   v=0; for(const h of node.hijos){const x=cuota(h,prod,wk); if(x!=null)v+=x}
   if(!node.hijos.some(h=>h.cuota||h.hijos.length))v=null;
 }
 return _qc[key]=v;
}

/* ============================================================
   MOTOR DE MEDICIÓN
   - Cumplimiento ↑: Real/Meta · ↓: Meta/Real (regla oficial)
   - Semáforo: 🟢 ≥100% · 🟡 80–99% · 🔴 <80% · ⚪ sin capturar
   - Demo: rellena mediciones no capturadas (determinístico)
   ============================================================ */
let DEMO=false;
try{DEMO=localStorage.getItem("cic_demo")==="1"}catch(e){}
function demoVal(kid,node,wk){
 const r=rng("d"+kid+node.id+wk);
 const base={pospago:.93,renov:.9,acces:.97,seguros:.86,arpu:.99,dap:.95,vhc:.94,asist:.94,cobhc:.97,entsal:1.0,faltas:1.15,capac:.95,adt:.99,tko:1.1,reinc:.9,prepago:.97,prosp:1.02,leads:.96,google:.93,revneg:1.2}[kid]||.95;
 const drift=(wk-27)*0.012, spread=(r()-.42)*.22;
 return Math.max(.45,Math.min(1.38, base+drift+spread));
}
/* medición → {meta,real,cumpl,demo,extra} para un nodo/kpi/semana */
function medir(kid,node,wk){
 const k=K[kid]; const esNac=node.nivel==="vpgn"; const esDir=node.nivel==="direccion";
 const capKey=esNac?"PRIME":node.id;
 const sinTac=(node.tacticos===false)||((node.id||"").startsWith("COM"));
 if(k.tipo==="TACTICO" && sinTac) return null;
 let meta=null, real=null, extra=null, demo=false, abs=false;
 const MODMAP={pospago:"pospago",renov:"renov",acces:"acces",seguros:"seguros",prepago:"prepago"};
 if(MODMAP[kid]!==undefined){
   const q=cuota(node,MODMAP[kid],wk);
   if(q!=null){
     if(q<=0){ // cuota de ajuste en la fuente: sin semáforo en este nivel
       return {k,meta:q,real:null,cumpl:null,demo:false,extra:null,abs:true,ajuste:true};
     }
     meta=q; abs=true;
     const vx=ventaMix(node,MODMAP[kid],wk);
     if(vx){ real=vx.v; demo=vx.demo; }
     else if(DEMO){ real=Math.round(q*demoVal(kid,node,wk)); demo=true; }
   } else if(k.tipo==="NEGOCIO"){
     meta = (kid in CAPTURA.negocioMeta) ? CAPTURA.negocioMeta[kid] : null; // p. ej. COMISIONISTAS
   }
 } else if(kid==="dap"||kid==="vhc"){
   const q=cuota(node,"pospago",wk);
   if(q!=null&&q>0){
     const nT=numTiendas(node), dias=DIAS_HABILES[wk]||7;
     let hcBase=null;
     if(kid==="vhc"){
       const rr=esDir?((CAPTURA_SEM[wk]||{})[capKey]||{}).hcOper:null;
       const nn2=esNac?(nacTac(wk)||{}).hcOper:null;
       hcBase=rr||nn2||(DEMO?(node.hc||node.oper):null);
       if(!hcBase)return {k,meta:null,real:null,cumpl:null,demo:false,extra:null,abs:false};
     }
     meta = kid==="dap" ? q/dias/nT : q/hcBase;
     extra={derivada:true};
     const vx=ventaMix(node,"pospago",wk);
     if(vx){ real = kid==="dap" ? vx.v/dias/nT : vx.v/hcBase; demo=vx.demo; }
   }
 } else if(k.tipo==="NEGOCIO"){
   meta = (kid==="arpu"?1:null);
 } else {
   const c=CAPTURA.tactico[kid];
   if(c){
     meta = (typeof c.meta==="object"&&c.meta!==null) ? (c.meta[capKey]??c.meta.PRIME??null) : c.meta;
   }
   if(kid==="entsal")meta=meta??.95;
   /* captura manual por región (módulo Captura) manda sobre la base */
   const reg=esDir?(CAPTURA_SEM[wk]||{})[capKey]:null;
   const nac=esNac?nacTac(wk):null;
   const src=reg||nac;
   if(src){
     const f=src;
     if(kid==="asist"&&f.asist!=null){real=f.asist;demo=false}
     if(kid==="faltas"&&f.faltas!=null){real=f.faltas;demo=false}
     if(kid==="capac"&&f.capac!=null){real=f.capac;demo=false}
     if(kid==="entsal"&&f.entrada!=null&&f.salida!=null){extra={entrada:f.entrada,salida:f.salida};real=(f.entrada+f.salida)/2;meta=meta??.95;demo=false}
     if(kid==="adt"&&f.adtAp!=null&&f.adtCi!=null){extra={ap:f.adtAp,ci:f.adtCi};real=(f.adtAp+f.adtCi)/2;demo=false}
     if(kid==="tko"&&f.tko!=null){real=f.tko;demo=false}
     if(kid==="reinc"&&f.reinc!=null){real=f.reinc;demo=false}
     if(kid==="prosp"){if(f.prospMeta!=null)meta=f.prospMeta;if(f.prospReal!=null){real=f.prospReal;demo=false}}
     if(kid==="leads"){if(f.leadsMeta!=null)meta=f.leadsMeta;if(f.leadsReal!=null){real=f.leadsReal;demo=false}}
     if(kid==="google"&&f.google!=null){real=f.google;demo=false}
     if(kid==="revneg"&&f.revneg!=null){real=f.revneg;demo=false}
   }
   if(kid==="cobhc"){
     meta=meta??.97;
     const f=reg||nac;
     if(f&&f.hcAut&&f.hcOper){extra={hcAut:f.hcAut,oper:f.hcOper};real=f.hcOper/f.hcAut;demo=false}
     else if(DEMO&&(node.hcAut||node.hc)){ /* simulación explícita */
       const aut=node.hcAut||Math.round(node.hc*1.03), op=node.oper||node.hc;
       extra={hcAut:aut,oper:op,demo:true};real=op/aut;demo=true;
     }
   }
 }
 /* metas demo para KPIs con meta "Definir por región" (solo en modo demo) */
 if(meta==null && DEMO && k.dir!=="info"){
   const share=(node.oper??node.hc??60)/3016;
   meta={prosp:Math.max(20,Math.round(1200*share)),leads:Math.max(15,Math.round(800*share))}[kid]??1;
   demo=true;
 }
 if(real==null && DEMO && k.dir!=="info"){
   const m=meta??1;
   const c=demoVal(kid,node,wk);
   real = k.dir==="down" ? +(m/c) : +(m*c);
   if(kid==="google"){real=Math.min(5,real)}
   demo=true;
   if(kid==="entsal"&&!extra){extra={entrada:real,salida:real,demo:true}}
   if(kid==="adt"){extra={ap:Math.min(1,real*1.005),ci:Math.min(1,real*.995),demo:true}}
 }
 let cumpl=null;
 if(meta!=null&&real!=null&&k.dir!=="info"){
   cumpl = k.dir==="down" ? (real===0?1.5:meta/real) : (meta===0?null:real/meta);
 }
 return {k,meta,real,cumpl,demo,extra,abs};
}

function fmtVal(k,v){ if(v==null)return"—"; if(k.fmt==="num1")return v.toFixed(2); if(k.fmt==="num")return Math.round(v).toLocaleString("es-MX"); return fmtPct(v); }

function semanaHoy(){
 const d=new Date(); if(d.getFullYear()!==2026)return 27;
 const dia=d.getMonth()===6?d.getDate():(d.getMonth()<6?1:31);
 return dia<=5?27:dia<=12?28:dia<=19?29:dia<=26?30:31;
}
function semanaInicial(){
 try{const s=JSON.parse(localStorage.getItem("cic_wk")||"null");
   if(s&&s.d===new Date().toDateString()&&s.w>=27&&s.w<=31)return s.w;}catch(e){}
 return semanaHoy();
}
const S={view:"resumen", wk:semanaInicial(), path:[ORG]};   // path: [nacional, dirección?, gerente?, tienda?]
const $=(q,el=document)=>el.querySelector(q);
const $$=(q,el=document)=>[...el.querySelectorAll(q)];

function irA(node){const i=S.path.indexOf(node); if(i>=0){S.path=S.path.slice(0,i+1)} else {S.path=[...S.path,node]} render()}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

/* agregación: mediciones de un nodo (usa hijos si existen para promediar en demo) */
function medicionesNodo(node,wk,ids){ return ids.map(id=>medir(id,node,wk)).filter(Boolean); }
function saludNodo(node,wk){
 const ms=medicionesNodo(node,wk,[...RANK_IDS,...(node.tacticos===false?[]:TAC_IDS)]);
 const con=ms.filter(m=>m.cumpl!=null);
 const v=con.filter(m=>m.cumpl>=1).length, a=con.filter(m=>m.cumpl>=.8&&m.cumpl<1).length, r=con.filter(m=>m.cumpl<.8).length;
 const sc=ms.length-con.length;
 const salud=con.length?con.reduce((s,m)=>s+Math.min(m.cumpl,1.15),0)/con.length:null;
 return {v,a,r,sc,tot:ms.length,salud};
}
function cumplProm(node,wk,ids){
 const ms=medicionesNodo(node,wk,ids).filter(m=>m.cumpl!=null);
 return ms.length?ms.reduce((s,m)=>s+m.cumpl,0)/ms.length:null;
}
/* proyección de cierre: tendencia lineal simple sobre semanas con datos */
function tendenciaLineal(pts,x){ /* pts:[{w,c}] → valor proyectado en x */
 if(!pts.length)return null;
 if(pts.length===1)return pts[0].c;
 const n=pts.length, sx=pts.reduce((s,p)=>s+p.w,0), sy=pts.reduce((s,p)=>s+p.c,0);
 const sxy=pts.reduce((s,p)=>s+p.w*p.c,0), sxx=pts.reduce((s,p)=>s+p.w*p.w,0);
 const m=(n*sxy-sx*sy)/(n*sxx-sx*sx||1), b=(sy-m*sx)/n;
 return Math.max(0,m*x+b);
}
function proyeccion(node){
 const pts=SEMANAS.map(w=>({w:w.n,c:cumplProm(node,w.n,RANK_IDS)})).filter(p=>p.c!=null);
 const v=tendenciaLineal(pts,31);
 return v==null?null:{v,base:pts.length};
}

/* ============================================================
   MOTOR DE ALERTAS (reglas del diccionario, sin criterios nuevos)
   Crítica: KPI de Negocio <80% · Alta: Negocio 80–99% o Táctico <80%
   Media: Táctico 80–99% · Baja: medición sin capturar
   ============================================================ */
let _alc={};
function alertas(wk){
 const key=wk+"|"+(DEMO?1:0);
 if(_alc[key])return _alc[key];
 const out=[];
 const scan=(node)=>{
   const ids=[...NEG_IDS,...(node.tacticos===false?[]:TAC_IDS)];
   for(const id of ids){
     const m=medir(id,node,wk); if(!m||m.demo)continue; // el demo nunca genera alertas
     const c=m.cumpl;
     if(c==null){ if(node.nivel!=="tienda"&&node.nivel!=="gerente") out.push({sev:"baja",node,m,msg:"Medición sin capturar en la cédula"}); continue; }
     if(m.k.tipo==="NEGOCIO"&&c<.8) out.push({sev:"critica",node,m,msg:"KPI de Negocio en rojo"});
     else if(m.k.tipo==="NEGOCIO"&&c<1) out.push({sev:"alta",node,m,msg:"KPI de Negocio en ámbar"});
     else if(m.k.tipo==="TACTICO"&&c<.8) out.push({sev:"alta",node,m,msg:"KPI táctico en rojo"});
     else if(m.k.tipo==="TACTICO"&&c<1) out.push({sev:"media",node,m,msg:"KPI táctico en ámbar"});
   }
   (node.hijos||[]).forEach(h=>scan(h)); // incluye tiendas: solo capturas reales alertan
 };
 scan(ORG);
 const rank={critica:0,alta:1,media:2,baja:3};
 return _alc[key]=out.sort((x,y)=>rank[x.sev]-rank[y.sev]||(x.m.cumpl??9)-(y.m.cumpl??9));
}

/* ============================================================
   COMPONENTES SVG
   ============================================================ */
function ringSVG(pct,col){
 const R=54,C=2*Math.PI*R,off=C*(1-Math.min(pct??0,1));
 return `<svg width="128" height="128" viewBox="0 0 128 128">
  <circle cx="64" cy="64" r="${R}" fill="none" stroke="var(--gris-soft)" stroke-width="11"/>
  <circle cx="64" cy="64" r="${R}" fill="none" stroke="${col}" stroke-width="11" stroke-linecap="round"
    stroke-dasharray="${C}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .7s ease"/></svg>`;
}
function spark(vals,w=180,h=26){
 const xy=(v,i)=>[i/(vals.length-1)*(w-6)+3, h-3-(Math.min(Math.max(v,.5),1.3)-.5)/.8*(h-8)];
 let d="",prev=false,last=null,nPts=0;
 vals.forEach((v,i)=>{ if(v==null){prev=false;return} const p=xy(v,i); d+=(prev?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)+" "; prev=true; last=p; nPts++; });
 if(nPts<2)return `<svg width="${w}" height="${h}"></svg>`;
 return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
  <path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
  <line x1="3" x2="${w-3}" y1="${h-3-(.5)/.8*(h-8)}" y2="${h-3-(.5)/.8*(h-8)}" stroke="var(--line2)" stroke-dasharray="3 3" stroke-width="1"/>
  <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="var(--accent)"/></svg>`;
}
function celdaCumpl(m){
 if(!m)return `<td>—</td>`;
 if(m.k.dir==="info")return `<td><span class="tag info">Info</span></td>`;
 const col=color(m.cumpl);
 if(m.cumpl==null)return `<td><span class="cell"><span class="dotc" style="background:var(--gris)"></span><span style="color:var(--muted2)">s/c</span></span></td>`;
 return `<td><span class="cell"><span class="barcell"><span class="bartrack"><i style="width:${Math.min(m.cumpl*100,100)}%;background:${CVAR[col]}"></i></span><b class="num" style="color:${CVAR[col]}">${fmtCumpl(m.cumpl)}</b></span>${m.demo?'<span class="demo-badge">demo</span>':""}</span></td>`;
}

 /* tácticos de la dirección */

function findNode(id,node=ORG){ if(node.id===id)return node; for(const h of node.hijos||[]){const f=findNode(id,h); if(f)return f} return null }
function pathTo(id){ const p=[]; const walk=(node,acc)=>{ const na=[...acc,node]; if(node.id===id){p.push(...na);return true} return (node.hijos||[]).some(h=>walk(h,na)) }; walk(ORG,[]); return p.length?p:[ORG]; }

}

/* ============================================================
   SINCRONIZACIÓN CENTRAL
   "Guardar" escribe directo a Firestore; todos los dispositivos
   reciben los cambios al instante (onSnapshot). Sin conexión o
   sin configurar, todo sigue funcionando local.
   ============================================================ */
const SYNC={on:false, db:null, subs:[], subBit:null, wk:null, err:null};
const PRODS_KEYS=["pospago","renov","acces","seguros","prepago"];
const TAC_FIELDS=["asist","hcAut","hcOper","faltas","entrada","salida","capac","adtAp","adtCi","tko","reinc","google","revneg","prospMeta","prospReal","leadsMeta","leadsReal"];
function sanNum(x,max){const n=Number(x);return Number.isFinite(n)&&n>=0&&n<=(max??1e6)?n:null}
function sanVentas(d){const o={};for(const p of PRODS_KEYS){const n=sanNum(d[p],1e5);if(n!=null)o[p]=n}return o}
function sanTac(d){const o={};for(const f of TAC_FIELDS){const n=sanNum(d[f],f==="google"?5:1e6);if(n!=null)o[f]=n}return o}
function sanBit(d){return {sem:sanNum(d.sem,99)??"—",region:String(d.region??"—").slice(0,60),kpi:String(d.kpi??"—").slice(0,80),rvm:String(d.rvm??"—").slice(0,60),causa:String(d.causa??"—").slice(0,600),accion:String(d.accion??"—").slice(0,600),resp:String(d.resp??"—").slice(0,80),fecha:String(d.fecha??"—").slice(0,20),est:["Abierto","En proceso","Cerrado"].includes(d.est)?d.est:"Abierto",ts:sanNum(d.ts)??0}}
function syncStatusTxt(){ return SYNC.on?"Central conectada":FIREBASE_CONFIG?(SYNC.err?"Sin conexión con la central":"Conectando…"):"Modo local (sin central)" }
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
async function syncInit(){
 if(!FIREBASE_CONFIG)return;
 setTimeout(()=>{if(!SYNC.on){SYNC.err=SYNC.err||new Error("timeout");tickSync()}},15000);
 try{
   const v="10.12.2";
   await loadScript("https://www.gstatic.com/firebasejs/"+v+"/firebase-app-compat.js");
   await loadScript("https://www.gstatic.com/firebasejs/"+v+"/firebase-auth-compat.js");
   await loadScript("https://www.gstatic.com/firebasejs/"+v+"/firebase-firestore-compat.js");
   firebase.initializeApp(FIREBASE_CONFIG);
   SYNC.db=firebase.firestore();
   if(REQUIERE_LOGIN){
     firebase.auth().onAuthStateChanged(async u=>{
       if(!u||u.isAnonymous){
         USUARIO=null; SYNC.on=false;
         SYNC.subs.forEach(fn=>fn()); SYNC.subs=[]; if(SYNC.subBit){SYNC.subBit();SYNC.subBit=null}
         aplicarRol(); render();
         $("#login").classList.add("on"); tickSync(); return;
       }
       try{
         const doc=await SYNC.db.collection("usuarios").doc(u.uid).get();
         if(!doc.exists){ $("#lErr").textContent="Usuario sin rol asignado. Contacta al administrador."; await firebase.auth().signOut(); return; }
         const d=doc.data();
         USUARIO={nombre:String(d.nombre||u.email),rid:d.rid||null,ger:d.ger||null,admin:d.admin===true};
         $("#login").classList.remove("on");
         const su=$("#sideUser"); if(su){su.style.display="flex"; $("#suNombre").textContent=USUARIO.nombre}
         SYNC.on=true; SYNC.err=null; aplicarRol();
         flushPending(); syncSubscribe(S.wk); syncSubBitacora(); tickSync(); render();
       }catch(e){ $("#lErr").textContent="No se pudo cargar tu perfil. Intenta de nuevo."; }
     });
   } else {
     try{await firebase.auth().signInAnonymously()}catch(e){/* si Anonymous no está habilitado, intenta directo */}
     SYNC.on=true; SYNC.err=null;
     flushPending(); /* sube lo capturado sin conexión antes de suscribir */
     syncSubscribe(S.wk); syncSubBitacora();
     tickSync();
   }
 }catch(e){ SYNC.err=e; SYNC.on=false; tickSync(); }
}
let USUARIO=null; /* {nombre,rid,ger,admin} cuando REQUIERE_LOGIN */
function aplicarRol(){
 if(!USUARIO){ MI_ROL={dir:"",ger:""}; S.path=[ORG]; return; }
 if(!USUARIO.admin){ MI_ROL.dir=USUARIO.rid||""; MI_ROL.ger=USUARIO.ger||""; try{localStorage.setItem("cic_rol",JSON.stringify(MI_ROL))}catch(e){} }
 /* cada rol aterriza en su propio nodo */
 const propio=USUARIO.admin?null:(USUARIO.ger||USUARIO.rid);
 S.path=propio&&findNode(propio)?pathTo(propio):[ORG];
 S.view="resumen";
 /* identidad visible en el menú */
 const su=$("#suRol");
 if(su){
   const reg=USUARIO.rid?(findNode(USUARIO.rid)||{}).nombre||USUARIO.rid:"";
   su.textContent=USUARIO.admin?"VPGM · Nacional":USUARIO.ger?"Gerente Regional · "+reg:"Director · "+reg;
 }
}
function syncSubscribe(wk){
 if(!SYNC.on)return;
 SYNC.subs.forEach(u=>u()); SYNC.subs=[]; SYNC.wk=wk;
 const base=SYNC.db.collection(SYNC_ROOT).doc("s"+wk);
 SYNC.subs.push(base.collection("ventas").onSnapshot(qs=>{
   const w={}; qs.forEach(d=>{const v=sanVentas(d.data()); if(Object.keys(v).length)w[d.id]=v});
   VENTAS[wk]=w; saveDatos(); resetCache(); T0.setTime(Date.now());
   if(["resumen","negocio","tacticos","alertas"].includes(S.view))renderSoon(); else tickSync();
 },e=>{SYNC.err=e}));
 SYNC.subs.push(base.collection("tacticos").onSnapshot(qs=>{
   const w={}; qs.forEach(d=>{const t=sanTac(d.data()); if(Object.keys(t).length)w[d.id]=t});
   CAPTURA_SEM[wk]=w; saveDatos(); resetCache(); T0.setTime(Date.now());
   if(["resumen","negocio","tacticos","alertas"].includes(S.view))renderSoon(); else tickSync();
 },e=>{SYNC.err=e}));
}
function syncSubBitacora(){
 if(!SYNC.on)return;
 if(SYNC.subBit)SYNC.subBit();
 SYNC.subBit=SYNC.db.collection(SYNC_ROOT).doc("meta").collection("bitacora").orderBy("ts","desc").onSnapshot(qs=>{
   BITACORA=[]; qs.forEach(d=>BITACORA.push({id:d.id,...sanBit(d.data())}));
   try{localStorage.setItem("cic_bitacora",JSON.stringify(BITACORA))}catch(e){}
   if(S.view==="bitacora")renderSoon();
 },e=>{});
}
function pushVentas(wk,cambios){ /* cambios: {cve: obj|null} */
 if(!SYNC.on){
   PENDING.v[wk]=PENDING.v[wk]||{}; for(const cve in cambios)PENDING.v[wk][cve]=1;
   saveDatos(); notifica("Guardado local ✓ · se subirá al conectar la central","warn"); return;
 }
 const b=SYNC.db.batch(); const col=SYNC.db.collection(SYNC_ROOT).doc("s"+wk).collection("ventas");
 for(const cve in cambios){ const v=cambios[cve]; v?b.set(col.doc(cve),v):b.delete(col.doc(cve)) }
 b.commit().then(()=>{
   if(PENDING.v[wk]){for(const cve in cambios)delete PENDING.v[wk][cve]; saveDatos()}
   notifica("Sincronizado con la central ✓","ok");
 }).catch(e=>{
   SYNC.err=e; PENDING.v[wk]=PENDING.v[wk]||{}; for(const cve in cambios)PENDING.v[wk][cve]=1; saveDatos();
   notifica("No se pudo subir a la central — guardado local, se reintenta al reconectar","err"); tickSync();
 });
}
function pushTac(wk,rid,obj){
 if(!SYNC.on){
   PENDING.t[wk]=PENDING.t[wk]||{}; PENDING.t[wk][rid]=1;
   saveDatos(); notifica("Guardado local ✓ · se subirá al conectar la central","warn"); return;
 }
 const ref=SYNC.db.collection(SYNC_ROOT).doc("s"+wk).collection("tacticos").doc(rid);
 (obj?ref.set(obj):ref.delete()).then(()=>{
   if(PENDING.t[wk])delete PENDING.t[wk][rid]; saveDatos();
   notifica("Sincronizado con la central ✓","ok");
 }).catch(e=>{
   SYNC.err=e; PENDING.t[wk]=PENDING.t[wk]||{}; PENDING.t[wk][rid]=1; saveDatos();
   notifica("No se pudo subir a la central — guardado local, se reintenta al reconectar","err"); tickSync();
 });
}
function flushPending(){
 for(const wk in PENDING.v){
   const cves=Object.keys(PENDING.v[wk]); if(!cves.length)continue;
   const cambios={}; cves.forEach(cve=>{cambios[cve]=(VENTAS[wk]||{})[cve]||null});
   pushVentas(+wk,cambios);
 }
 for(const wk in PENDING.t){
   for(const rid in PENDING.t[wk])pushTac(+wk,rid,((CAPTURA_SEM[wk]||{})[rid])||null);
 }
}
function pushBitAdd(b){ if(!SYNC.on)return null; const ref=SYNC.db.collection(SYNC_ROOT).doc("meta").collection("bitacora").doc(); ref.set({...b,ts:Date.now()}).catch(()=>{}); return ref.id }
function pushBitDel(id){ if(SYNC.on&&id)SYNC.db.collection(SYNC_ROOT).doc("meta").collection("bitacora").doc(id).delete().catch(()=>{}) }
function notifica(msg,tipo){
 const c=$("#toasts"); if(!c)return;
 const t=document.createElement("div"); t.className="toast "+(tipo||""); t.textContent=msg;
 c.appendChild(t); setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(()=>t.remove(),320)},3800);
}
function editando(){const a=document.activeElement;return a&&["INPUT","SELECT","TEXTAREA"].includes(a.tagName)}
let _rt=null;
function renderSoon(){clearTimeout(_rt);_rt=setTimeout(()=>{if(!editando())render()},150)}
function tickSync(){ const el2=$("#syncState"); if(el2){el2.textContent=syncStatusTxt(); el2.style.color=SYNC.on?"var(--verde)":FIREBASE_CONFIG?"var(--ambar)":"var(--muted)"} }

/* datos capturados persistidos */
loadDatos();
syncInit();
/* tema persistido */
try{const t=localStorage.getItem("cic_theme"); if(t)document.documentElement.dataset.theme=t}catch(e){}
render();
</script>
</body>
</html>
